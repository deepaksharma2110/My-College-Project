<!DOCTYPE html>
<html>
<head>
<title>Student Admission Form</title>
</head>

<body>

<h2>Student Admission Form</h2>

<form>

<label for="name">Full Name:</label><br>
<input type="text" id="name" placeholder="Enter your full name" required>
<br><br>

<label for="age">Age:</label><br>
<input type="number" id="age" placeholder="Enter your age">
<br><br>

<label>Gender:</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
<br><br>

<label for="dob">Date of Birth:</label><br>
<input type="date" id="dob">
<br><br>

<label for="email">Email:</label><br>
<input type="email" id="email" placeholder="Enter your email">
<br><br>

<label for="phone">Contact Number:</label><br>
<input type="tel" id="phone" placeholder="Enter your contact number">
<br><br>

<label for="address">Address:</label><br>
<textarea id="address" placeholder="Enter your address"></textarea>
<br><br>

<label for="course">Course Selection:</label><br>
<select id="course">
<option>Select Course</option>
<option>BCA</option>
<option>BBA</option>
<option>B.Tech</option>
<option>MCA</option>
</select>
<br><br>

<label for="qualification">Previous Qualification:</label><br>
<input type="text" id="qualification" placeholder="Enter your qualification">
<br><br>

<label for="marks">Percentage / Marks:</label><br>
<input type="number" id="marks" placeholder="Enter your percentage">
<br><br>

<label for="photo">Upload Photo:</label><br>
<input type="file" id="photo">
<br><br>

<input type="submit" value="Submit">

</form>

</body>
</html>
